<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoApi | Portfolyo</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #121212;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 0.5rem;
        }

        p {
            color: #bbb;
            line-height: 1.6;
        }

        .links a {
            display: inline-block;
            margin: 10px;
            color: #00ff88;
            text-decoration: none;
            border: 1px solid #00ff88;
            padding: 5px 15px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .links a:hover {
            background: #00ff88;
            color: #121212;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Merhaba, Ben Memo!</h1>
        <p>Geleceğin projelerini GitHub üzerinde inşa ediyorum. CV ve projelerim çok yakında burada olacak.</p>
        <div class="links">
            <a href="https://github.com/MemoApi">GitHub</a>
            <a href="#">LinkedIn</a>
        </div>
    </div>
</body>

</html>
